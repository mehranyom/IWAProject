{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow-sm mt-5">
            <div class="card-body p-4">
                <h3 class="card-title text-center mb-4">Join the Guild</h3>
                
                <form method="POST" action="{{ url_for('register') }}">
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" class="form-control" id="username" name="username" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    
                    <div class="mb-4">
                        <label for="role" class="form-label">Account Type</label>
                        <select class="form-select" id="role" name="role" required>
                            <option value="" disabled selected>Select your path...</option>
                            <option value="Adventurer">Adventurer</option>
                            <option value="Guild Master">Guild Master</option>
                        </select>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100">Register</button>
                </form>
                
                <div class="text-center mt-3">
                    <small>Already a member? <a href="{{ url_for('login') }}">Log in here</a>.</small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
